name: float-grant-line

on:
  workflow_dispatch:
    inputs:
      agents:
        description: "Space-separated Arc testnet agent wallets to grant/skip"
        required: true
        type: string

jobs:
  grant:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
      ARC_USDC: ${{ secrets.ARC_USDC }}
      SHADOW_FLOAT: "0xf305647ba0ff7f1e2d4be5f37f2ef9f930531057"
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: install app deps
        working-directory: app
        run: pnpm install --no-frozen-lockfile --ignore-workspace
      - name: grant invited Float line
        run: node app/scripts/float-grant-line.mjs ${{ inputs.agents }}

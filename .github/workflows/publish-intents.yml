name: publish-intents

on:
  workflow_dispatch:

concurrency:
  group: publish-intents
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
      ARC_PUBLIC_RPC_URL: ${{ secrets.ARC_PUBLIC_RPC_URL }}
      ARC_USDC: ${{ secrets.ARC_USDC }}
      SHADOW_ROUTER: ${{ secrets.SHADOW_ROUTER }}
      SHADOW_ARCETH: ${{ secrets.SHADOW_ARCETH }}
      SHADOW_AMM: ${{ secrets.SHADOW_AMM }}
      KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
      KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: install agent deps
        working-directory: agent
        run: pnpm install --no-frozen-lockfile --ignore-workspace
      - name: top up publisher gas
        working-directory: agent
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CAT_AGENT_PRIVATE_KEY: ${{ secrets.CAT_AGENT_PRIVATE_KEY }}
          LOBSTER_AGENT_PRIVATE_KEY: ${{ secrets.LOBSTER_AGENT_PRIVATE_KEY }}
          OTTER_AGENT_PRIVATE_KEY: ${{ secrets.OTTER_AGENT_PRIVATE_KEY }}
          FOLLOWER_A_PRIVATE_KEY: ${{ secrets.FOLLOWER_A_PRIVATE_KEY }}
          FOLLOWER_B_PRIVATE_KEY: ${{ secrets.FOLLOWER_B_PRIVATE_KEY }}
        run: pnpm --ignore-workspace exec tsx src/topup-gas.ts
      - name: publish CatArb intent (split outcome)
        working-directory: agent
        env:
          PUBLISHER_KEY: ${{ secrets.CAT_AGENT_PRIVATE_KEY }}
          SOURCE_LABEL: CatArb
          SOURCE_NAME: CatArb
          INTENT_AMOUNT_USDC: "0.02"
          INTENT_MIN_BPS: "10500"
          INTENT_RISK_LEVEL: "2"
        run: pnpm --ignore-workspace exec tsx src/cron-publish.ts
      - name: publish LobsterRisk intent (safe copy)
        working-directory: agent
        env:
          PUBLISHER_KEY: ${{ secrets.LOBSTER_AGENT_PRIVATE_KEY }}
          SOURCE_LABEL: LobsterRisk
          SOURCE_NAME: LobsterRisk
          INTENT_AMOUNT_USDC: "0.01"
          INTENT_MIN_BPS: "9800"
          INTENT_RISK_LEVEL: "1"
        run: pnpm --ignore-workspace exec tsx src/cron-publish.ts
      # MomentumOtter is the LLM-reasoned persona. BANKR_LLM_KEY MUST be a
      # non-empty repo secret; if empty the code silently falls back to the
      # deterministic policy (logged as model=fallback fellBack=true) and the
      # "AI-driven intent" story becomes theater. Verify after a deploy by
      # grepping the run log for "model=deepseek-v3.2 fellBack=false".
      - name: publish MomentumOtter intent (LLM-reasoned)
        working-directory: agent
        env:
          PUBLISHER_KEY: ${{ secrets.OTTER_AGENT_PRIVATE_KEY }}
          SOURCE_LABEL: MomentumOtter
          SOURCE_NAME: MomentumOtter
          INTENT_AMOUNT_USDC: "0.015"
          INTENT_MIN_BPS: "9700"
          INTENT_RISK_LEVEL: "3"
          LLM_REASONING_ENABLED: "1"
          BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
          BANKR_LLM_MODEL: deepseek-v3.2
        run: pnpm --ignore-workspace exec tsx src/cron-publish.ts
      - name: close copied positions
        working-directory: agent
        env:
          FOLLOWER_A_PRIVATE_KEY: ${{ secrets.FOLLOWER_A_PRIVATE_KEY }}
          FOLLOWER_B_PRIVATE_KEY: ${{ secrets.FOLLOWER_B_PRIVATE_KEY }}
          CLOSE_LIMIT: "2"
          CLOSE_SCAN_LIMIT: "30"
        run: pnpm --ignore-workspace exec tsx src/close-position.ts
